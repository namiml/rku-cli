name: Publish to npm

# Publishes @namiml/rku-cli when a release lands on main (the release PR pushed
# from the private source repo bumps package.json + dist; merging it triggers
# this). Idempotent: skips if there's no built dist or the version is already on
# npm.
#
# Auth is token-less via npm Trusted Publishing (OIDC): npm is configured to
# trust this repo + this workflow file, so the publish authenticates with the
# GitHub Actions id-token — no NPM_ACCESS_TOKEN secret. Provenance is automatic.
# Requires npm >= 11.5 (we install the latest), which Node 22's bundled npm 10
# predates.

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @namiml/rku-cli
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) needs npm >= 11.5; ensure it regardless of the
      # version bundled with Node.
      - name: Use latest npm
        run: npm install -g npm@latest

      # No install needed — npm publish just packs the committed dist/.
      - name: Publish if this is a new version with built artifacts
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [ ! -f dist/index.js ]; then
            echo "No dist/index.js — nothing to publish (bootstrap / non-release push)."
            exit 0
          fi
          if npm view "@namiml/rku-cli@${VERSION}" version >/dev/null 2>&1; then
            echo "v${VERSION} already published — skipping."
            exit 0
          fi
          npm publish --access public --provenance
